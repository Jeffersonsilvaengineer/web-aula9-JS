<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4 - E-mail com RegExp</title>
    <script>
        window.onload = inicio;
        let saida;

        function inicio() {
            let btn = document.getElementById('botao');
            btn.addEventListener('click', marcarEmail);
            saida = document.getElementById('saida');
        }

        function marcarEmail() {
            let campo = document.getElementById('texto');
            let texto = campo.value;
            let marcado = texto.replace(/([\w.-]+@[\w.-]+\.[A-Za-z]{2,})/g, '<strong>$1</strong>');

            saida.innerHTML = marcado;
        }
    </script>
</head>

<body>
    <h1>Identificar e-mail</h1>
    <p>Digite um texto contendo e-mail no formato nome@site.com.</p>
    <textarea id="texto" rows="6" cols="60">Contato: nome@site.com</textarea><br>
    <button id="botao">Marcar e-mail</button>
    <h2>Resultado</h2>
    <div id="saida"></div>
</body>

</html>
