<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2 - Telefone</title>
    <script>
        window.onload = inicio;
        let saida;

        function inicio() {
            let btn = document.getElementById('botao');
            btn.addEventListener('click', marcarTelefone);
            saida = document.getElementById('saida');
        }

        function marcarTelefone() {
            let campo = document.getElementById('texto');
            let texto = campo.value;
            let marcado = texto.replace(/(\d{5}-\d{4})/g, '<strong>$1</strong>');

            saida.innerHTML = marcado;
        }
    </script>
</head>

<body>
    <h1>Identificar telefone</h1>
    <p>Digite um texto contendo telefone no formato 99999-9999.</p>
    <textarea id="texto" rows="6" cols="60">Meu telefone é 99999-9999.</textarea><br>
    <button id="botao">Marcar telefone</button>
    <h2>Resultado</h2>
    <div id="saida"></div>
</body>

</html>
